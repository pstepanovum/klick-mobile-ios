name: Klic
options:
  bundleIdPrefix: com.klic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    from: "2.0.0"
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift.git
    from: "16.1.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""           # set for signing, or sign manually with the certs in klic-assets/Apple

targets:
  Klic:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klicmobile.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Klic.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
    dependencies:
      - package: LiveKit
      - package: SocketIO
      - target: KlicWidgets

  KlicWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Sources/Shared          # CallActivityAttributes shared with the app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klicmobile.app.widgets
        INFOPLIST_FILE: Widget/Info.plist

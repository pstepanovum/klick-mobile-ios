name: Klic
options:
  bundleIdPrefix: com.klic
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    from: "2.0.0"
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift.git
    from: "16.1.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: "4.5.0"
  Inject:
    url: https://github.com/krzysztofzablocki/Inject.git
    from: "1.5.2"

settings:
  base:
    # CocoaPods script phases (embed frameworks, libsignal FFI download) need
    # file access that Xcode's user-script sandboxing denies.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.4.9"
    CURRENT_PROJECT_VERSION: "42"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "775RWRF5LZ"

targets:
  Klic:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klic.mobile.app
        INFOPLIST_FILE: Resources/Info.plist
        # LibSignalClient's public interface references its C FFI module; the app
        # target must be able to resolve it too (the podspec only sets this on
        # the pod target).
        SWIFT_INCLUDE_PATHS: "$(inherited) $(PODS_ROOT)/LibSignalClient/swift/Sources/SignalFfi"
        CODE_SIGN_ENTITLEMENTS: Resources/Klic.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # NO: CocoaPods script phases (embed frameworks, libsignal FFI download)
        # need file access that Xcode's user-script sandboxing denies.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: LiveKit
      - package: SocketIO
      - package: Lottie
      - package: Inject
      - target: KlicWidgets

  KlicWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
      - path: Sources/Shared          # CallActivityAttributes shared with the app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.klic.mobile.app.widgets
        INFOPLIST_FILE: Widget/Info.plist

# Explicit shared scheme so `xcodegen generate` always emits it. Without this, a malformed-project
# warning (the Sources/Shared vs on-disk Sources/shared case collision) intermittently left the
# regenerated project with NO scheme, so `xcodebuild -scheme Klic` (release.sh archive) failed with
# "does not contain a scheme named Klic". Defining it here makes scheme generation deterministic.
schemes:
  Klic:
    build:
      targets:
        Klic: all
    run:
      config: Debug
    archive:
      config: Release
